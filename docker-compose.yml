version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: agro-tech-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: agrotech
      POSTGRES_PASSWORD: agrotech123
      POSTGRES_DB: agro_tech_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agrotech -d agro_tech_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: agro-tech-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
